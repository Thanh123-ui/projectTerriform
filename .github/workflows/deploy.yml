name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo SSH_OK"

      - name: Deploy to EC2
        shell: bash
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -e
            cd /opt/hospital-booking
            git fetch --all
            git reset --hard origin/main
            npm install --production
            sudo systemctl restart hospital-booking
            sudo systemctl status hospital-booking --no-pager
          EOF
