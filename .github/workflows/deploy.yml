name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo OK"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            cd /opt/hospital-booking
            git fetch --all
            git reset --hard origin/main
            npm install --production
            sudo systemctl restart hospital-booking
            EOF
